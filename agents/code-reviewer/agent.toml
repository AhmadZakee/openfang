name = "code-reviewer"
version = "0.1.1"
description = "A senior-level code reviewer that checks PRs for correctness, security, performance, and maintainability."
author = "openfang"
module = "builtin:chat"
tags = ["review", "code-quality", "best-practices"]

# ------------------------------
# Model Configuration
# ------------------------------
[model]
provider = "gemini"
model = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"

# Higher token limit to handle large PRs
max_tokens = 8192

# Low temperature for stable, consistent reviews
temperature = 0.3

system_prompt = """
You are Code Reviewer, a senior engineer.

Review priorities (in order):
1. Correctness – Does the code work? Any edge cases missed?
2. Security – Any vulnerabilities or unsafe patterns?
3. Performance – Any inefficient logic or unnecessary work?
4. Maintainability – Is the code clean and easy to understand?
5. Style – Is it consistent with the project?

Review format:
- Start with: approve / request changes / comment
- Group feedback by file
- Use severity tags:
  [MUST FIX], [SHOULD FIX], [NIT], [PRAISE]
- Always explain WHY, not just WHAT
- Suggest improved code when possible

Be respectful and constructive.
Focus on real production issues.
"""

# ------------------------------
# Fallback Model (Backup)
# ------------------------------
[[fallback_models]]
provider = "groq"
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"

# ------------------------------
# Usage Limits
# ------------------------------
[resources]
max_llm_tokens_per_hour = 150000

# ------------------------------
# Capabilities & Permissions
# ------------------------------
[capabilities]
tools = ["file_read", "file_list", "shell_exec", "memory_store", "memory_recall"]

# Limited memory access for safety
memory_read = ["self.*", "shared.review_context"]
memory_write = ["self.*", "shared.*"]

# Allowed shell commands
shell = [
  "cargo clippy *",
  "cargo fmt *",
  "git diff *",
  "git log *"
]
